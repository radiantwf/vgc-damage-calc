server {
    # 侦听80端口
    listen       80;
    charset UTF-8;

    location / {
        try_files $uri /index.html;
        root   /front_end/;
        index index.html;

        # 为wasm和mjs文件添加正确的MIME类型
        location ~* \.(wasm)$ {
            types {
                application/wasm wasm;
            }
            add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.(mjs)$ {
            types {
                application/javascript mjs;
            }
            add_header Cache-Control "public, max-age=3600";
        }

        #图片缓存365天
        location ~.*\.(jpg|png|jpeg|ico)$ {  
            expires 365d;  
        }

        #js css缓存30天
        location ~.*\.(js|css|mjs)$ {  
            expires 30d;  
        }
    }
}